<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mintly · 시작하기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  /* ============================================================
     Mintly 온보딩 위저드 — 핀테크 소프트 × 프로덕션 마감
     토큰: 8px 그리드 · 제한된 타이포 스케일 · CSS 변수 테마
     ============================================================ */
  :root {
    /* 팔레트 — 화이트 + 브랜드 2색 절제 */
    --bg:            #F1F3F5;
    --surface:       #FFFFFF;
    --surface-soft:  #F7F8FA;
    --surface-hover: #F1F3F5;

    --primary:       #3182F6;
    --primary-press: #1B64DA;
    --primary-wash:  #EAF2FE;
    --mint:          #00C6AE;
    --mint-wash:     #E5FAF6;

    --text-strong:   #191F28;
    --text-mid:      #4E5968;
    --text-weak:     #8B95A1;
    --border:        #E5E8EB;
    --border-strong: #D1D6DB;

    --warning:       #FF9500;
    --success:       #00C6AE;

    /* 형태 — 넉넉한 radius */
    --r-card:  20px;
    --r-btn:   14px;
    --r-chip:  12px;
    --r-pill:  999px;

    /* elevation — 아주 옅고 넓게 */
    --shadow-sm: 0 2px 8px rgba(23,31,40,.04);
    --shadow-md: 0 8px 24px rgba(23,31,40,.06);
    --shadow-lg: 0 12px 32px rgba(23,31,40,.10);

    /* 타이포 스케일 (제한) */
    --fs-cap:   13px;
    --fs-body:  15px;
    --fs-title: 17px;
    --fs-lead:  20px;
    --fs-head:  24px;

    /* motion */
    --ease: cubic-bezier(.22,.61,.36,1);
    --spring: cubic-bezier(.34,1.56,.64,1);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background:
      radial-gradient(1100px 520px at 12% -8%, var(--mint-wash) 0%, rgba(229,250,246,0) 60%),
      radial-gradient(1000px 560px at 92% 108%, var(--primary-wash) 0%, rgba(234,242,254,0) 58%),
      var(--bg);
    color: var(--text-strong);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }

  .stage {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 48px 16px;
  }

  /* ---------- 위저드 카드 ---------- */
  .wizard {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-sm), var(--shadow-md);
    padding: 32px;
    animation: rise 460ms var(--ease) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- 헤더: 브랜드 + 건너뛰기 ---------- */
  .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, #17E1C4 0%, var(--mint) 55%, #00A896 100%);
    box-shadow: 0 4px 12px rgba(0,198,174,.28);
    display: grid;
    place-items: center;
    color: #06322C;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.03em;
  }
  .brand-meta { display: flex; flex-direction: column; line-height: 1.2; }
  .brand-name { font-size: var(--fs-title); font-weight: 700; color: var(--text-strong); }
  .brand-tag  { font-size: var(--fs-cap); font-weight: 500; color: var(--text-weak); }

  .skip {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-mid);
    font-family: inherit;
    font-size: var(--fs-body);
    font-weight: 600;
    padding: 8px 12px;
    border-radius: var(--r-chip);
    cursor: pointer;
    transition: background .16s var(--ease), color .16s var(--ease);
  }
  .skip:hover { background: var(--surface-soft); color: var(--text-strong); }
  .skip:active { background: var(--surface-hover); }
  .skip:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  /* ---------- 진행 표시 ---------- */
  .progress { margin-bottom: 28px; }
  .track {
    height: 6px;
    width: 100%;
    background: var(--surface-hover);
    border-radius: var(--r-pill);
    overflow: hidden;
  }
  .fill {
    height: 100%;
    width: 60%;
    border-radius: var(--r-pill);
    background: linear-gradient(90deg, var(--primary) 0%, #57A5FF 100%);
    transition: width .48s var(--ease);
  }
  .progress-meta {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .dots { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: var(--r-pill);
    background: var(--border-strong);
    transition: background .24s var(--ease), width .24s var(--ease);
  }
  .dot[data-on="true"] { background: var(--primary); }
  .dot[data-cur="true"] { width: 22px; background: var(--primary); }

  .count { font-size: var(--fs-body); font-weight: 600; color: var(--text-mid); font-variant-numeric: tabular-nums; }
  .count b { color: var(--primary); font-weight: 800; }

  /* ---------- 스텝 본문 ---------- */
  .step-head { margin-bottom: 24px; }
  .eyebrow {
    display: inline-block;
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: .02em;
    color: var(--primary);
    background: var(--primary-wash);
    padding: 4px 12px;
    border-radius: var(--r-pill);
    margin-bottom: 12px;
  }
  .title {
    margin: 0 0 8px;
    font-size: var(--fs-head);
    line-height: 1.34;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-strong);
  }
  .subtitle {
    margin: 0;
    font-size: var(--fs-body);
    line-height: 1.55;
    font-weight: 500;
    color: var(--text-mid);
  }

  /* ---------- 선택 카드 그리드 ---------- */
  .options { display: flex; flex-direction: column; gap: 12px; }

  .option {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    text-align: left;
    padding: 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    font-family: inherit;
    transition:
      transform .18s var(--ease),
      box-shadow .18s var(--ease),
      border-color .18s var(--ease),
      background .18s var(--ease);
  }
  .option:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: var(--border-strong);
  }
  .option:active { transform: translateY(0) scale(.99); }
  .option:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }

  .option[aria-checked="true"] {
    border-color: var(--primary);
    background: var(--primary-wash);
    box-shadow: 0 6px 20px rgba(49,130,246,.16);
  }
  .option[aria-checked="true"]:hover { transform: translateY(-2px); }

  .icn {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border-radius: var(--r-chip);
    background: var(--surface-soft);
    color: var(--text-mid);
    display: grid;
    place-items: center;
    transition: background .18s var(--ease), color .18s var(--ease);
  }
  .icn svg { width: 24px; height: 24px; display: block; }
  .option[aria-checked="true"] .icn { background: var(--primary); color: #fff; }

  .opt-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .opt-title { font-size: var(--fs-title); font-weight: 700; color: var(--text-strong); }
  .opt-desc  { font-size: var(--fs-cap); font-weight: 500; color: var(--text-mid); line-height: 1.45; }

  /* 선택 체크 배지 */
  .check {
    flex: 0 0 auto;
    margin-left: auto;
    width: 24px;
    height: 24px;
    border-radius: var(--r-pill);
    background: var(--primary);
    color: #fff;
    display: grid;
    place-items: center;
    transform: scale(0);
    opacity: 0;
    transition: transform .22s var(--spring), opacity .16s var(--ease);
  }
  .check svg { width: 14px; height: 14px; }
  .option[aria-checked="true"] .check { transform: scale(1); opacity: 1; }

  /* 빈 라디오 표식 (미선택 시) */
  .radio-empty {
    flex: 0 0 auto;
    margin-left: auto;
    width: 22px;
    height: 22px;
    border-radius: var(--r-pill);
    border: 2px solid var(--border-strong);
    transition: border-color .18s var(--ease);
  }
  .option:hover .radio-empty { border-color: var(--primary); }
  .option[aria-checked="true"] .radio-empty { display: none; }
  .option:not([aria-checked="true"]) .check { display: none; }

  .helper {
    margin: 20px 0 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: var(--fs-cap);
    font-weight: 500;
    color: var(--text-mid);
    line-height: 1.5;
  }
  .helper svg { flex: 0 0 auto; width: 16px; height: 16px; color: var(--mint); margin-top: 1px; }

  /* ---------- 푸터 내비게이션 ---------- */
  .nav {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
  }
  .btn {
    appearance: none;
    font-family: inherit;
    height: 52px;
    padding: 0 24px;
    border-radius: var(--r-btn);
    font-size: var(--fs-title);
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 1px solid transparent;
    transition: background .14s var(--ease), transform .12s var(--ease), box-shadow .14s var(--ease), color .14s var(--ease);
  }
  .btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  .btn-secondary {
    background: var(--surface-soft);
    color: var(--text-strong);
    border-color: var(--border);
  }
  .btn-secondary:hover:not(:disabled) { background: var(--surface-hover); }
  .btn-secondary:active:not(:disabled) { transform: scale(.97); }
  .btn-secondary:disabled { opacity: .45; cursor: not-allowed; }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 4px 12px rgba(49,130,246,.28);
  }
  .btn-primary:hover { background: var(--primary-press); box-shadow: 0 6px 16px rgba(27,100,218,.32); }
  .btn-primary:active { transform: scale(.97); background: var(--primary-press); }

  .btn-primary svg { width: 18px; height: 18px; }

  /* ---------- 페이지 푸터 ---------- */
  .page-foot {
    font-size: var(--fs-cap);
    font-weight: 500;
    color: var(--text-weak);
    letter-spacing: .01em;
  }

  /* ---------- 반응형 ---------- */
  @media (max-width: 600px) {
    .stage { padding: 24px 12px; }
    .wizard { padding: 24px; border-radius: 16px; }
    .title { font-size: var(--fs-lead); }
    .nav { grid-template-columns: 1fr; }
    .btn-secondary { order: 2; }
    .btn-primary { order: 1; }
  }

  /* ---------- 모션 최소화 ---------- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .001ms !important;
      scroll-behavior: auto !important;
    }
    .fill { transition: none; }
  }
</style>
</head>
<body>
  <div class="stage">
    <main class="wizard" role="form" aria-label="Mintly 시작하기 온보딩">

      <!-- 헤더 -->
      <header class="head">
        <div class="brand">
          <div class="logo" aria-hidden="true">M</div>
          <div class="brand-meta">
            <span class="brand-name">Mintly</span>
            <span class="brand-tag">3분이면 준비 끝</span>
          </div>
        </div>
        <button type="button" class="skip" id="skip">건너뛰기</button>
      </header>

      <!-- 진행 표시 -->
      <div class="progress">
        <div class="track" role="progressbar" aria-valuemin="1" aria-valuemax="5" aria-valuenow="3" id="track" aria-label="온보딩 진행률">
          <div class="fill" id="fill" style="width:60%"></div>
        </div>
        <div class="progress-meta">
          <div class="dots" id="dots" aria-hidden="true">
            <span class="dot" data-on="true"></span>
            <span class="dot" data-on="true"></span>
            <span class="dot" data-on="true" data-cur="true"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <span class="count" id="count"><b>3</b> / 5 단계</span>
        </div>
      </div>

      <!-- 스텝 본문 (기본 = 3단계, JS 실패 시에도 그대로 노출) -->
      <div class="step-head">
        <span class="eyebrow" id="eyebrow">자동 저축</span>
        <h1 class="title" id="title">언제 모을까요?</h1>
        <p class="subtitle" id="subtitle">주기만 정해두면 목표 금액까지 Mintly가 알아서 채워드려요.</p>
      </div>

      <div class="options" id="options" role="radiogroup" aria-labelledby="title">

        <button type="button" class="option" role="radio" aria-checked="false" data-idx="0">
          <span class="icn" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/>
            </svg>
          </span>
          <span class="opt-body">
            <span class="opt-title">매일 조금씩</span>
            <span class="opt-desc">커피 한 잔 값을 매일 자동으로</span>
          </span>
          <span class="radio-empty" aria-hidden="true"></span>
          <span class="check" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </span>
        </button>

        <button type="button" class="option" role="radio" aria-checked="true" data-idx="1">
          <span class="icn" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="5" width="16" height="16" rx="3"/><path d="M4 9.5h16M8 3v4M16 3v4"/><path d="M12 13.5h3.2"/>
            </svg>
          </span>
          <span class="opt-body">
            <span class="opt-title">매주 한 번</span>
            <span class="opt-desc">요일을 정해 주 1회 규칙적으로</span>
          </span>
          <span class="radio-empty" aria-hidden="true"></span>
          <span class="check" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </span>
        </button>

        <button type="button" class="option" role="radio" aria-checked="false" data-idx="2">
          <span class="icn" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="18" height="13" rx="3"/><path d="M3 10.5h18M15.5 14.5h2.5"/>
            </svg>
          </span>
          <span class="opt-body">
            <span class="opt-title">급여일마다</span>
            <span class="opt-desc">월급이 들어오면 저축부터 먼저</span>
          </span>
          <span class="radio-empty" aria-hidden="true"></span>
          <span class="check" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </span>
        </button>

      </div>

      <p class="helper" id="helper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8a4 4 0 0 0-4 4c0 1.5.8 2.3 1.5 3 .5.5.5 1 .5 1.5h4c0-.5 0-1 .5-1.5.7-.7 1.5-1.5 1.5-3a4 4 0 0 0-4-4z"/><path d="M10 20h4"/></svg>
        <span>언제든 앱에서 주기를 바꿀 수 있어요. 지금은 편한 쪽으로 골라두세요.</span>
      </p>

      <!-- 내비게이션 -->
      <nav class="nav">
        <button type="button" class="btn btn-secondary" id="prev">이전</button>
        <button type="button" class="btn btn-primary" id="next">
          <span id="next-label">다음</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </nav>

    </main>

    <p class="page-foot">온보딩 스텝 위저드 · 핀테크 소프트</p>
  </div>

<script>
(function () {
  "use strict";

  // 아이콘 (stroke, 24px, currentColor) — 일관된 스트로크 굵기
  var I = {
    sun:     '<circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/>',
    week:    '<rect x="4" y="5" width="16" height="16" rx="3"/><path d="M4 9.5h16M8 3v4M16 3v4"/><path d="M12 13.5h3.2"/>',
    wallet:  '<rect x="3" y="6" width="18" height="13" rx="3"/><path d="M3 10.5h18M15.5 14.5h2.5"/>',
    shield:  '<path d="M12 2.5l7.5 3.2v5.1c0 4.9-3.3 8.3-7.5 9.7C7.8 19.1 4.5 15.7 4.5 10.8V5.7L12 2.5z"/>',
    coins:   '<ellipse cx="12" cy="6" rx="7" ry="3"/><path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6"/><path d="M5 12c0 1.7 3.1 3 7 3s7-1.3 7-3"/>',
    trend:   '<path d="M3 16.5l5.5-5.5 3.5 3.5L21 6"/><path d="M15.5 6H21v5.5"/>',
    stable:  '<path d="M12 2.5l7.5 3.2v5.1c0 4.9-3.3 8.3-7.5 9.7C7.8 19.1 4.5 15.7 4.5 10.8V5.7L12 2.5z"/><path d="M9 12l2 2 4-4"/>',
    balance: '<path d="M12 4v16M5 8h14M5 8l-2.5 5a3 3 0 0 0 5 0L5 8zM19 8l-2.5 5a3 3 0 0 0 5 0L19 8z"/>',
    rocket:  '<path d="M12 3c3 1.5 5 4.5 5 8 0 1.2-.3 2.3-.7 3.3L14 16h-4l-2.3-1.7C7.3 13.3 7 12.2 7 11c0-3.5 2-6.5 5-8z"/><circle cx="12" cy="10" r="1.6"/><path d="M10 16l-2 4 2.5-1M14 16l2 4-2.5-1"/>',
    cash:    '<rect x="3" y="6" width="18" height="12" rx="3"/><circle cx="12" cy="12" r="2.6"/><path d="M6 9v.01M18 15v.01"/>',
    edit:    '<path d="M12 20h8"/><path d="M15.5 4.5a2 2 0 0 1 3 3L8 18l-4 1 1-4L15.5 4.5z"/>',
    bell:    '<path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 19a2 2 0 0 0 4 0"/>',
    report:  '<rect x="4" y="3" width="16" height="18" rx="3"/><path d="M8 8h8M8 12h8M8 16h5"/>',
    moon:    '<path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/>'
  };

  function svg(key) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" '
      + 'stroke-linecap="round" stroke-linejoin="round">' + I[key] + '</svg>';
  }

  // 5개 스텝 정의 — 콘텐츠 풍부
  var STEPS = [
    { eyebrow: "저축 목표", title: "무엇을 위해 모을까요?",
      subtitle: "목표에 맞춰 추천 상품과 이자율을 골라드려요.", helper: "여러 목표는 나중에 추가할 수 있어요. 우선 가장 급한 하나만.",
      sel: 1,
      opts: [
        { ic: "shield", t: "비상금 마련", d: "갑작스러운 지출에 대비하는 안전 자금" },
        { ic: "coins",  t: "목돈 모으기", d: "여행·이사·결혼 같은 큰 지출 준비" },
        { ic: "trend",  t: "투자로 불리기", d: "예금보다 높은 수익을 노리는 자산" }
      ] },
    { eyebrow: "투자 성향", title: "어떤 스타일이 편하세요?",
      subtitle: "원금 보호와 수익 사이, 나에게 맞는 균형을 찾아드려요.", helper: "성향은 언제든 재설정할 수 있고, 상품 추천에만 쓰여요.",
      sel: 0,
      opts: [
        { ic: "stable",  t: "안정형", d: "원금 손실은 피하고 싶어요" },
        { ic: "balance", t: "균형형", d: "적당한 위험은 감수할게요" },
        { ic: "rocket",  t: "도전형", d: "높은 수익을 위해 변동성도 OK" }
      ] },
    { eyebrow: "자동 저축", title: "언제 모을까요?",
      subtitle: "주기만 정해두면 목표 금액까지 Mintly가 알아서 채워드려요.", helper: "언제든 앱에서 주기를 바꿀 수 있어요. 지금은 편한 쪽으로 골라두세요.",
      sel: 1,
      opts: [
        { ic: "sun",    t: "매일 조금씩", d: "커피 한 잔 값을 매일 자동으로" },
        { ic: "week",   t: "매주 한 번", d: "요일을 정해 주 1회 규칙적으로" },
        { ic: "wallet", t: "급여일마다", d: "월급이 들어오면 저축부터 먼저" }
      ] },
    { eyebrow: "목표 금액", title: "얼마를 모아볼까요?",
      subtitle: "목표를 정하면 매달 필요한 저축액을 자동으로 계산해요.", helper: "금액이 부담되면 다음 화면에서 기간을 늘려 조정할 수 있어요.",
      sel: 1,
      opts: [
        { ic: "cash",  t: "300만원",   d: "6개월이면 도달, 가벼운 첫 목표" },
        { ic: "coins", t: "1,000만원", d: "1년 목표, 가장 많이 고르는 금액" },
        { ic: "edit",  t: "직접 설정",  d: "원하는 금액을 자유롭게 입력" }
      ] },
    { eyebrow: "알림 설정", title: "어떻게 알려드릴까요?",
      subtitle: "저축 현황과 목표 달성 소식을 편한 방식으로 받아보세요.", helper: "모든 알림은 나중에 설정에서 세밀하게 끌 수 있어요.",
      sel: 0,
      opts: [
        { ic: "bell",   t: "실시간 푸시", d: "이체·달성 순간 바로 알림" },
        { ic: "report", t: "주간 리포트", d: "매주 월요일 요약만 한 번" },
        { ic: "moon",   t: "방해 금지",   d: "알림 없이 앱에서 직접 확인" }
      ] }
    ];

  var TOTAL = STEPS.length;
  var cur = 2; // 기본 진입 = 3단계 (●●●○○)

  var els = {
    fill:    document.getElementById("fill"),
    dots:    document.getElementById("dots"),
    count:   document.getElementById("count"),
    track:   document.getElementById("track"),
    eyebrow: document.getElementById("eyebrow"),
    title:   document.getElementById("title"),
    subtitle:document.getElementById("subtitle"),
    options: document.getElementById("options"),
    helper:  document.getElementById("helper").querySelector("span"),
    prev:    document.getElementById("prev"),
    next:    document.getElementById("next"),
    nextLabel: document.getElementById("next-label"),
    skip:    document.getElementById("skip")
  };

  function render() {
    var s = STEPS[cur];

    // 진행률
    var pct = ((cur + 1) / TOTAL) * 100;
    els.fill.style.width = pct + "%";
    els.count.innerHTML = "<b>" + (cur + 1) + "</b> / " + TOTAL + " 단계";
    els.track.setAttribute("aria-valuenow", String(cur + 1));

    // 점
    var dots = els.dots.children;
    for (var i = 0; i < dots.length; i++) {
      if (i <= cur) { dots[i].setAttribute("data-on", "true"); }
      else { dots[i].removeAttribute("data-on"); }
      if (i === cur) { dots[i].setAttribute("data-cur", "true"); }
      else { dots[i].removeAttribute("data-cur"); }
    }

    // 텍스트
    els.eyebrow.textContent = s.eyebrow;
    els.title.textContent = s.title;
    els.subtitle.textContent = s.subtitle;
    els.helper.textContent = s.helper;

    // 카드
    var html = "";
    for (var j = 0; j < s.opts.length; j++) {
      var o = s.opts[j];
      var checked = (j === s.sel);
      html +=
        '<button type="button" class="option" role="radio" aria-checked="' + checked + '" data-idx="' + j + '" tabindex="' + (checked ? "0" : "-1") + '">' +
          '<span class="icn" aria-hidden="true">' + svg(o.ic) + '</span>' +
          '<span class="opt-body">' +
            '<span class="opt-title">' + o.t + '</span>' +
            '<span class="opt-desc">' + o.d + '</span>' +
          '</span>' +
          '<span class="radio-empty" aria-hidden="true"></span>' +
          '<span class="check" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>' +
        '</button>';
    }
    els.options.innerHTML = html;

    // 버튼 상태
    els.prev.disabled = (cur === 0);
    els.nextLabel.textContent = (cur === TOTAL - 1) ? "시작하기" : "다음";
    els.skip.style.visibility = (cur === TOTAL - 1) ? "hidden" : "visible";
  }

  function select(idx) {
    STEPS[cur].sel = idx;
    var opts = els.options.querySelectorAll(".option");
    for (var i = 0; i < opts.length; i++) {
      var on = (i === idx);
      opts[i].setAttribute("aria-checked", String(on));
      opts[i].setAttribute("tabindex", on ? "0" : "-1");
    }
  }

  // 카드 클릭 / 키보드 (라디오 그룹 화살표 이동)
  els.options.addEventListener("click", function (e) {
    var btn = e.target.closest(".option");
    if (btn) { select(parseInt(btn.getAttribute("data-idx"), 10)); }
  });
  els.options.addEventListener("keydown", function (e) {
    var opts = els.options.querySelectorAll(".option");
    var count = opts.length;
    var i = STEPS[cur].sel;
    if (e.key === "ArrowDown" || e.key === "ArrowRight") {
      e.preventDefault(); select((i + 1) % count); opts[(i + 1) % count].focus();
    } else if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
      e.preventDefault(); select((i - 1 + count) % count); opts[(i - 1 + count) % count].focus();
    }
  });

  els.next.addEventListener("click", function () {
    if (cur < TOTAL - 1) { cur++; render(); }
    else { celebrate(); }
  });
  els.prev.addEventListener("click", function () {
    if (cur > 0) { cur--; render(); }
  });
  els.skip.addEventListener("click", function () {
    cur = TOTAL - 1; render();
  });

  function celebrate() {
    els.nextLabel.textContent = "설정 완료";
    els.next.style.background = "var(--mint)";
    els.next.style.boxShadow = "0 6px 16px rgba(0,198,174,.32)";
  }

  render();
})();
</script>
</body>
</html>
