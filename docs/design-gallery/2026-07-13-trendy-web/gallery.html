<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>디자이너 템플릿 라이브러리 45종</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#0b0d12; color:#e7e9ee; font-family:'Pretendard',-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  header { padding:30px 26px 4px; }
  h1 { margin:0 0 5px; font-size:25px; letter-spacing:-.02em; }
  .sub { color:#9aa0ad; font-size:13.5px; }
  .bar2 { position:sticky; top:0; z-index:20; background:rgba(11,13,18,.92); backdrop-filter:blur(8px);
          display:flex; flex-wrap:wrap; align-items:center; gap:7px; padding:12px 26px; border-bottom:1px solid #232733; margin-top:14px; }
  .grp { display:flex; gap:5px; align-items:center; }
  .grp .lb { font-size:11px; color:#7c8698; margin-right:2px; }
  .btn { background:#181b24; border:1px solid #232733; color:#e7e9ee; border-radius:8px; padding:6px 11px; font-size:12.5px; cursor:pointer; font-family:inherit; }
  .btn:hover { border-color:#3a4560; }
  .btn.on { background:#8ab4ff; color:#08122a; border-color:#8ab4ff; font-weight:700; }
  select.btn { padding:6px 8px; }
  input.search { background:#0f121a; border:1px solid #232733; color:#e7e9ee; border-radius:8px; padding:7px 11px; font-size:12.5px; font-family:inherit; width:170px; }
  input.search:focus { outline:2px solid #8ab4ff; border-color:#8ab4ff; }
  .grow { flex:1; }
  .count { color:#7c8698; font-size:12px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:18px; padding:18px 26px; }
  .card { background:#14171f; border:1px solid #232733; border-radius:13px; overflow:hidden; display:flex; flex-direction:column; transition:border-color .15s, transform .15s; }
  .card:hover { border-color:#3a4560; transform:translateY(-2px); }
  .bar { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:11px 13px 8px; }
  .name b { font-weight:700; font-size:14px; }
  .name em { font-style:normal; display:block; font-size:11.5px; color:#8f97a6; margin-top:3px; }
  .no { color:#7c8698; font-variant-numeric:tabular-nums; margin-right:7px; font-size:12.5px; }
  .open { color:#8ab4ff; text-decoration:none; font-size:12px; white-space:nowrap; border:1px solid #2b3446; border-radius:8px; padding:5px 10px; }
  .open:hover { background:#1b2233; }
  .tags { display:flex; gap:6px; padding:0 13px 10px; }
  .tag { font-size:10.5px; color:#9aa0ad; border:1px solid #2b3446; border-radius:6px; padding:2px 7px; }
  .frame { position:relative; width:360px; max-width:100%; height:254px; margin:0 auto; overflow:hidden; border-top:1px solid #232733; border-bottom:1px solid #232733; background:#fff; }
  .frame iframe { position:absolute; top:0; left:0; width:1280px; height:900px; border:0; transform:scale(.281); transform-origin:top left; }
  .empty { color:#7c8698; text-align:center; padding:60px; }
  footer { color:#6b7280; font-size:12px; text-align:center; padding:26px; }
  @media (max-width:420px){ .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>디자이너 템플릿 라이브러리 <span style="font-size:14px;color:#9aa0ad;font-weight:400">45종</span></h1>
  <div class="sub">필요한 타입을 카테고리·톤·스타일로 걸러 찾으세요. 카드를 새 탭으로 열면 전체를 봐요.</div>
</header>
<div class="bar2">
  <div class="grp"><span class="lb">분류</span>
    <button class="btn on" data-f="cat" data-v="all">전체</button>
    <button class="btn" data-f="cat" data-v="랜딩">🚀 랜딩</button>
    <button class="btn" data-f="cat" data-v="앱">🖥️ 앱</button>
    <button class="btn" data-f="cat" data-v="콘텐츠">🛍️ 콘텐츠</button>
  </div>
  <div class="grp"><span class="lb">톤</span>
    <button class="btn on" data-f="tone" data-v="all">전체</button>
    <button class="btn" data-f="tone" data-v="light">☀️ 라이트</button>
    <button class="btn" data-f="tone" data-v="dark">🌙 다크</button>
  </div>
  <div class="grp"><span class="lb">스타일</span><select class="btn" id="styleSel"><option value="all">전체</option></select></div>
  <input class="search" id="q" placeholder="검색 (예: 로그인·차트)">
  <span class="grow"></span>
  <span class="count" id="count"></span>
</div>
<main id="app"></main>
<footer>dj-superkit · design-style-explorer · 디자이너 템플릿 라이브러리 45종</footer>
<script>
// n, slug, 타입, 스타일, 톤, 분류, 언제쓰나
const T = [
['01','saas-landing','SaaS 랜딩','컬러풀 모던','light','랜딩','제품 소개·전환 홈'],
['02','ai-product','AI 프로덕트','AI 프로덕트','light','랜딩','AI 서비스 소개'],
['09','app-landing','앱 랜딩','핀테크 소프트','light','랜딩','모바일 앱 소개'],
['10','startup-bento','스타트업 홈','벤토 그리드','light','랜딩','제품 홈(벤토)'],
['13','luxury-brand','럭셔리 브랜드','럭셔리 다크','dark','랜딩','명품·프리미엄'],
['14','event-landing','이벤트/컨퍼런스','Y2K','dark','랜딩','행사·티켓'],
['15','careers','채용/컬처','웜 프로','light','랜딩','채용·팀 소개'],
['29','newsletter','뉴스레터 랜딩','웜 프로','light','랜딩','구독 유도'],
['30','product-launch','제품 출시','맥시멀','light','랜딩','출시·대기명단'],
['45','landing-variation','SaaS 랜딩 (변주)','오로라','dark','랜딩','제품 홈(다크 변주)'],
['04','admin-dashboard-sidebar','관리자 대시보드','엔터프라이즈','light','앱','운영 관리'],
['05','analytics-nosidebar','애널리틱스','다크 대시보드','dark','앱','데이터 관제'],
['11','api-docs-sidebar','API 문서','다크 미니멀','dark','앱','개발자 문서'],
['16','login','로그인/회원가입','트렌디 SaaS','light','앱','인증'],
['17','onboarding','온보딩 위저드','핀테크 소프트','light','앱','첫 사용 안내'],
['18','settings','설정/프로필','엔터프라이즈','light','앱','계정 설정'],
['22','faq','FAQ/헬프센터','머티리얼','light','앱','고객 지원'],
['23','inbox','알림/인박스','다크 미니멀','dark','앱','메시지·알림'],
['24','calendar','캘린더/스케줄','데이터 라이트','light','앱','일정 관리'],
['25','kanban','칸반 보드','오로라','dark','앱','업무 보드'],
['26','chat','AI 채팅','AI 프로덕트','light','앱','챗봇·메신저'],
['32','search','검색 결과','데이터 라이트','light','앱','검색·필터 결과'],
['33','success','결제 완료','핀테크 소프트','light','앱','성공·확인'],
['34','profile-edit','프로필 편집','엔터프라이즈','light','앱','정보 수정 폼'],
['35','project-dashboard','프로젝트 대시보드','벤토 그리드','light','앱','프로젝트 관리'],
['36','crm','CRM 관리','머티리얼','light','앱','영업 파이프라인'],
['37','integrations','통합 마켓','트렌디 SaaS','light','앱','연동·플러그인'],
['39','data-table','데이터 테이블','데이터 라이트','light','앱','표·스프레드시트'],
['40','multistep-form','다단계 폼','접근성','light','앱','설문·신청서'],
['41','notification-center','알림 설정','다크 미니멀','dark','앱','알림 환경설정'],
['03','pricing','가격/요금제','미니멀','light','콘텐츠','요금제 비교'],
['06','portfolio','포트폴리오','브루탈리즘','light','콘텐츠','스튜디오 소개'],
['07','ecommerce-detail','이커머스 상세','커머스','light','콘텐츠','상품 상세·구매'],
['08','blog-article','블로그 아티클','에디토리얼','light','콘텐츠','긴 글 읽기'],
['12','healthcare-booking','헬스케어 예약','헬스케어','light','콘텐츠','병원·예약'],
['19','ecommerce-list','이커머스 목록','커머스','light','콘텐츠','상품 목록·필터'],
['20','checkout','장바구니/체크아웃','미니멀','light','콘텐츠','결제'],
['21','blog-home','블로그 홈','에디토리얼','light','콘텐츠','매거진 홈'],
['27','social-profile','소셜 프로필','컬러풀 모던','light','콘텐츠','프로필·피드'],
['28','error-404','404 에러','레트로 픽셀','light','콘텐츠','에러·빈 상태'],
['31','email','마케팅 이메일','컬러풀 모던','light','콘텐츠','이메일 발송'],
['38','reviews','리뷰/평점','웜 프로','light','콘텐츠','후기·평점'],
['42','media-streaming','미디어 스트리밍','럭셔리 다크','dark','콘텐츠','OTT·미디어 홈'],
['43','forum','커뮤니티 포럼','네이처 오가닉','light','콘텐츠','게시판·커뮤니티'],
['44','invoice','인보이스','공공포털','light','콘텐츠','청구서·문서'],
];
const F = {cat:'all', tone:'all', style:'all', q:''};
// style dropdown
const styles=[...new Set(T.map(t=>t[3]))].sort();
const sel=document.getElementById('styleSel');
styles.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
const app=document.getElementById('app');
function render(){
  const items=T.filter(t=>(F.cat==='all'||t[5]===F.cat)&&(F.tone==='all'||t[4]===F.tone)&&(F.style==='all'||t[3]===F.style)
    &&(!F.q||(t[2]+t[3]+t[6]+t[1]).toLowerCase().includes(F.q.toLowerCase())));
  app.innerHTML='';
  if(!items.length){ app.innerHTML='<div class="empty">조건에 맞는 템플릿이 없어요. 필터를 풀어보세요.</div>'; document.getElementById('count').textContent='0 / '+T.length; return; }
  const g=document.createElement('div'); g.className='grid';
  items.forEach(t=>{ const file=`page-${t[0]}-${t[1]}.html`;
    const d=document.createElement('div'); d.className='card';
    d.innerHTML=`<div class="bar"><div class="name"><b><span class="no">${t[0]}</span>${t[2]}</b><em>${t[3]} · ${t[6]}</em></div><a class="open" href="${file}" target="_blank" rel="noopener">새 탭 ↗</a></div>
      <div class="frame"><iframe src="${file}" loading="lazy" title="${t[2]}"></iframe></div>
      <div class="tags"><span class="tag">${t[4]==='dark'?'🌙 다크':'☀️ 라이트'}</span><span class="tag">${t[5]}</span></div>`;
    g.appendChild(d); });
  app.appendChild(g);
  document.getElementById('count').textContent=items.length+' / '+T.length;
}
document.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>{
  const f=b.dataset.f; document.querySelectorAll(`[data-f="${f}"]`).forEach(x=>x.classList.remove('on')); b.classList.add('on'); F[f]=b.dataset.v; render();
}));
sel.addEventListener('change',()=>{ F.style=sel.value; render(); });
document.getElementById('q').addEventListener('input',e=>{ F.q=e.target.value; render(); });
render();
</script>
</body>
</html>
