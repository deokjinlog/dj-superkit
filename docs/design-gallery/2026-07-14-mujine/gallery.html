<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MUJINE 셀러 대시보드 — 30 스타일</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#0b0d12; color:#e7e9ee; font-family:'Pretendard',-apple-system,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  header { padding:30px 26px 10px; }
  h1 { margin:0 0 5px; font-size:25px; letter-spacing:-.02em; }
  .sub { color:#9aa0ad; font-size:13.5px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:18px; padding:12px 26px 30px; }
  .card { background:#14171f; border:1px solid #232733; border-radius:13px; overflow:hidden; display:flex; flex-direction:column; transition:border-color .15s, transform .15s; }
  .card:hover { border-color:#3a4560; transform:translateY(-2px); }
  .bar { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 13px; }
  .name { font-weight:700; font-size:14px; }
  .name .no { display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:22px; padding:0 6px;
              background:#222838; color:#9fb4e6; border-radius:6px; font-variant-numeric:tabular-nums; font-size:12px; margin-right:9px; }
  .open { color:#8ab4ff; text-decoration:none; font-size:11.5px; white-space:nowrap; border:1px solid #2b3446; border-radius:8px; padding:5px 10px; }
  .open:hover { background:#1b2233; }
  .frame { position:relative; width:360px; max-width:100%; height:254px; margin:0 auto; overflow:hidden; border-top:1px solid #232733; background:#fff; }
  .frame iframe { position:absolute; top:0; left:0; width:1280px; height:900px; border:0; transform:scale(.281); transform-origin:top left; }
  footer { color:#6b7280; font-size:12px; text-align:center; padding:26px; }
  @media (max-width:420px){ .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <h1>MUJINE 셀러 대시보드 — 30 스타일</h1>
  <div class="sub">같은 대시보드 화면을 30가지 디자인으로. 1~30번 쭉 훑어보고, 카드를 새 탭으로 열면 전체를 봐요.</div>
</header>
<div class="grid" id="grid"></div>
<footer>dj-superkit · MUJINE 셀러 대시보드 · 30 스타일</footer>
<script>
// 번호 1~30, 파일슬러그, 디자인 명칭
const T = [
[1,'sf-hud','SF HUD'],[2,'public-portal','공공포털'],[3,'trendy','트렌디 SaaS'],[4,'dense-terminal','고밀도 터미널'],[5,'brutalism','브루탈리즘'],
[6,'glassmorphism','글래스모피즘'],[7,'minimal-mono','미니멀 모노크롬'],[8,'luxury-dark','럭셔리 다크'],[9,'retro-pixel','레트로 픽셀'],[10,'editorial','에디토리얼'],
[11,'nature-organic','네이처 오가닉'],[12,'neumorphism','뉴모피즘'],[13,'aurora','오로라 그라디언트'],[14,'bento','벤토 그리드'],[15,'claymorphism','클레이모피즘'],
[16,'material','머티리얼'],[17,'y2k','Y2K 베이퍼웨이브'],[18,'swiss','스위스'],[19,'maximalism','맥시멀리즘'],[20,'dark-analytics','다크 대시보드'],
[21,'ai-product','AI 프로덕트'],[22,'fintech','핀테크 소프트'],[23,'enterprise','엔터프라이즈 B2B'],[24,'healthcare','헬스케어 웰니스'],[25,'commerce','커머스 리테일'],
[26,'dark-minimal','다크 프로 미니멀'],[27,'warm-pro','웜 프로페셔널'],[28,'accessible','하이컨트라스트 접근성'],[29,'vibrant','컬러풀 모던'],[30,'data-admin','데이터 리치 라이트'],
];
const grid=document.getElementById('grid');
T.forEach(t=>{ const file=`dashboard-${t[1]}.html`;
  const d=document.createElement('div'); d.className='card';
  d.innerHTML=`<div class="bar"><div class="name"><span class="no">${t[0]}</span>${t[2]}</div><a class="open" href="${file}" target="_blank" rel="noopener">새 탭 ↗</a></div><div class="frame"><iframe src="${file}" loading="lazy" title="${t[2]}"></iframe></div>`;
  grid.appendChild(d);
});
</script>
</body>
</html>
